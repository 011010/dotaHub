services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dota
      POSTGRES_PASSWORD: dota
      POSTGRES_DB: dota_replay_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dota -d dota_replay_hub"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: apps/api/.env
    environment:
      DATABASE_URL: postgresql://dota:dota@postgres:5432/dota_replay_hub
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:3002
      FRONTEND_URL: http://localhost:3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.worker
    restart: unless-stopped
    env_file: apps/api/.env
    environment:
      DATABASE_URL: postgresql://dota:dota@postgres:5432/dota_replay_hub
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    restart: unless-stopped
    ports:
      - "3002:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
